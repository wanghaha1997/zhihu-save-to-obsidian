<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>保存到 Obsidian</title>
    <style>
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2328;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 16px;
      }

      .field {
        margin-bottom: 10px;
      }

      .label {
        margin-bottom: 4px;
        font-size: 12px;
        color: #57606a;
      }

      .value {
        font-size: 13px;
        line-height: 1.45;
        word-break: break-all;
      }

      select {
        width: 100%;
        padding: 7px 8px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        background: #ffffff;
        font-size: 13px;
      }

      .hidden {
        display: none;
      }

      button {
        width: 100%;
        margin-top: 8px;
        padding: 9px 10px;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        background: #0969da;
        font-size: 14px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        background: #8c959f;
      }

      #status {
        margin-top: 10px;
        min-height: 18px;
        font-size: 12px;
        line-height: 1.45;
        color: #57606a;
        white-space: pre-wrap;
      }

      .error {
        color: #cf222e;
      }

      .success {
        color: #1a7f37;
      }
    </style>
  </head>
  <body>
    <h1>保存到 Obsidian</h1>

    <div class="field">
      <div class="label">当前页面标题</div>
      <div id="title" class="value">读取中...</div>
    </div>

    <div class="field">
      <div class="label">作者</div>
      <div id="author" class="value">读取中...</div>
    </div>

    <div class="field">
      <div class="label">原文链接</div>
      <div id="url" class="value">读取中...</div>
    </div>

    <div id="candidateField" class="field hidden">
      <div class="label">选择要保存的回答/正文</div>
      <select id="candidate"></select>
    </div>

    <button id="save" type="button" disabled>保存到 Obsidian</button>
    <div id="status">正在读取当前页面...</div>

    <script src="popup.js"></script>
  </body>
</html>
