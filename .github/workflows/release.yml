name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate version and package extension
        id: package
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./extension/manifest.json').version")"

          if [[ "v${package_version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}." >&2
            exit 1
          fi

          if [[ "${manifest_version}" != "${package_version}" ]]; then
            echo "Extension version ${manifest_version} does not match package version ${package_version}." >&2
            exit 1
          fi

          archive="chinese-web-to-obsidian-extension-${GITHUB_REF_NAME}.zip"
          mkdir -p dist
          (cd extension && zip -r "../dist/${archive}" . -x "*.DS_Store")
          (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/${{ steps.package.outputs.archive }}#Chrome extension ZIP" \
            "dist/${{ steps.package.outputs.archive }}.sha256#SHA256 checksum" \
            --title "Chinese Web to Obsidian ${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
